name: 🚀 Deploy MailVault to Pterodactyl

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  # ═══════════════════════════
  #  BUILD & TEST
  # ═══════════════════════════
  build:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build project
        run: npm run build
        env:
          GOOGLE_CLIENT_ID:     ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          JWT_SECRET:           ${{ secrets.JWT_SECRET }}
          APP_URL:              ${{ secrets.APP_URL }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: mailvault-build
          path: dist/
          retention-days: 1

  # ═══════════════════════════
  #  DEPLOY TO PTERODACTYL
  # ═══════════════════════════
  deploy:
    name: 🐦 Deploy to Pterodactyl
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: mailvault-build
          path: dist/

      - name: Create deployment archive
        run: |
          cp package.json dist/
          cp package-lock.json dist/
          cd dist && tar -czf ../mailvault-deploy.tar.gz .

      - name: Stop server on Pterodactyl
        run: |
          curl -s -X POST \
            "${{ secrets.PTERODACTYL_URL }}/api/client/servers/${{ secrets.PTERODACTYL_SERVER_ID }}/power" \
            -H "Authorization: Bearer ${{ secrets.PTERODACTYL_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"signal":"stop"}'
          sleep 5

      - name: Upload files via SFTP
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.PTERODACTYL_SFTP_HOST }}
          port:     ${{ secrets.PTERODACTYL_SFTP_PORT }}
          username: ${{ secrets.PTERODACTYL_SFTP_USER }}
          password: ${{ secrets.PTERODACTYL_SFTP_PASS }}
          source:   "mailvault-deploy.tar.gz"
          target:   "/home/container"

      - name: Extract & Install on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.PTERODACTYL_SFTP_HOST }}
          port:     ${{ secrets.PTERODACTYL_SFTP_PORT }}
          username: ${{ secrets.PTERODACTYL_SFTP_USER }}
          password: ${{ secrets.PTERODACTYL_SFTP_PASS }}
          script: |
            cd /home/container
            tar -xzf mailvault-deploy.tar.gz
            npm install --production
            rm mailvault-deploy.tar.gz
            echo "✅ Files deployed successfully"

      - name: Start server on Pterodactyl
        run: |
          curl -s -X POST \
            "${{ secrets.PTERODACTYL_URL }}/api/client/servers/${{ secrets.PTERODACTYL_SERVER_ID }}/power" \
            -H "Authorization: Bearer ${{ secrets.PTERODACTYL_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"signal":"start"}'

      - name: Health check
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.APP_URL }}/health)
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check failed: HTTP $STATUS"
            exit 1
          fi
          echo "✅ Server is healthy: HTTP $STATUS"

      - name: Notify on success
        if: success()
        run: echo "🚀 MailVault deployed successfully to Pterodactyl!"

      - name: Notify on failure
        if: failure()
        run: echo "❌ Deployment failed! Check logs above."
